<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
            <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
        </div>

        <form id="login-form" class="auth-form active">
            <h2>Chào mừng trở lại!</h2>
            <div class="input-group">
                <input type="email" placeholder="Nhập email...">
            </div>
            <div class="input-group" style="position: relative;">
                <input type="password" id="pass1" placeholder="Nhập mật khẩu">
                <i id="eye1" class="bi bi-eye-slash-fill" onclick="togglePassword()"></i>
            </div>
            <div class="forgot-pass">
                <a href="#">Quên mật khẩu?</a>
            </div>
            <button type="submit" class="submit-btn">ĐĂNG NHẬP</button>
        </form>

        <form id="register-form" class="auth-form">
            <h2>Tạo tài khoản</h2>
            <div class="input-group">
                <input type="text" placeholder="Nhập họ tên của bạn..." >
            </div>
            <div class="input-group">
                <input type="email" placeholder="Nhập email của bạn" >
            </div>
            <div class="input-group" style="position: relative;">
                <input type="password" id="pass2" placeholder="Tạo mật khẩu an toàn..."> 
                <i id="eye2" class="bi bi-eye-slash-fill" onclick="togglePassword()"></i>
            </div>
            <button type="submit" class="submit-btn">ĐĂNG KÝ MỚI</button>
        </form>
    </div>
    <script src="../js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
